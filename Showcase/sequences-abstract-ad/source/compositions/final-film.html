<template id="sequences-abstract-film-template">

      font-family: Montserrat;
      src: url("assets/fonts/montserrat-latin-500-normal.woff2") format("woff2");
      font-weight: 500;
    }

      src: url("assets/fonts/montserrat-latin-700-normal.woff2") format("woff2");

    }

      box-sizing: border-box;
    }

      --paper: #fff;
      --ink: #11110f;

      --cobalt: #2457d6;

      color: var(--ink);

      inset: 0;

      height: 13px;

      border-left: 16px solid var(--ink);

      border-color: var(--green);

    }
