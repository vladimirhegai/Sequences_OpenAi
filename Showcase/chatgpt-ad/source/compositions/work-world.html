      </style>
      <div data-hf-id="chatgpt-work-world-root" id="ww-root" data-composition-id="chatgpt-work-world" data-start="0" data-duration="7.4" data-width="1920" data-height="1080" data-fps="30">
        <div id="ww-backdrop" data-hf-id="ww-backdrop" class="clip" data-start="0" data-duration="7.4" data-track-index="0"></div>
        <div id="ww-veil"></div>
        <div id="ww-world" data-hf-id="ww-world" class="clip" data-start="0" data-duration="7.4" data-track-index="1">
          <div id="ww-window" data-hf-id="ww-window">
            <div id="ww-header">
              <div id="ww-title">ChatGPT</div>
              <div id="ww-model-chip">5.5 Auto</div>
              <div class="ww-hdr-dot" style="right: 28px;"></div>
              <div class="ww-hdr-dot" style="right: 44px;"></div>
              <div class="ww-hdr-dot" style="right: 60px;"></div>
            </div>
            <div id="ww-rail">
              <div id="ww-bubble" data-hf-id="ww-bubble">Plan my week around my deadlines</div>
              <div id="ww-thought" data-hf-id="ww-thought">Thought for 6s</div>
              <div id="ww-assist" data-hf-id="ww-assist">Here&rsquo;s your week &mdash; planned around all three deadlines.</div>
            </div>
            <div id="ww-planner" data-hf-id="ww-planner">
              <div id="ww-plan-title">This week</div>
              <div id="ww-status-wrap">
                <div id="ww-status-a" data-hf-id="ww-status-a">Planning your week&hellip;</div>
                <div id="ww-status-b" data-hf-id="ww-status-b">Week planned &check;</div>
              </div>
              <div id="ww-day-grid" data-hf-id="ww-day-grid"></div>
            </div>
          </div>
          <div id="ww-shock-1"></div>
          <div id="ww-shock-2"></div>
        </div>
      </div>
      <script>
        (() => {
          // The week is fixed, never random: 5 columns, 3 accent deadlines.
          const grid = document.getElementById("ww-day-grid");
          const columns = [
            { day: "Mon", date: "14", tasks: [{ h: 88 }, { h: 64 }, { h: 96 }, { h: 72 }] },
            { day: "Tue", date: "15", tasks: [{ h: 96, due: true }, { h: 72 }, { h: 88 }, { h: 56 }] },
            { day: "Wed", date: "16", tasks: [{ h: 64 }, { h: 96 }, { h: 72 }, { h: 88 }] },
            { day: "Thu", date: "17", tasks: [{ h: 88, due: true }, { h: 96 }, { h: 64 }, { h: 72 }] },
            { day: "Fri", date: "18", tasks: [{ h: 96, due: true }, { h: 72 }, { h: 88 }] },
          ];
          const heads = [];
          const blocks = [];
          columns.forEach((col, ci) => {
            const x = ci * 156;
            const head = document.createElement("div");
            head.className = "ww-col-head";
            head.style.left = `${x}px`;
            head.innerHTML = `${col.day}<span class="ww-col-date">${col.date}</span>`;
            grid.appendChild(head);
            heads.push(head);
            let y = 50;
            col.tasks.forEach((task) => {
              const el = document.createElement("div");
              el.className = task.due ? "ww-task due" : "ww-task";
              el.style.left = `${x}px`;
              el.style.top = `${y}px`;
              el.style.height = `${task.h}px`;
              const bar1 = document.createElement("div");
              bar1.className = "ww-task-bar";
              bar1.style.top = "16px";
              bar1.style.width = task.due ? "72px" : "100px";
              el.appendChild(bar1);
              if (task.h >= 56) {
                const bar2 = document.createElement("div");
                bar2.className = "ww-task-bar";
                bar2.style.top = "36px";
                bar2.style.width = "62px";
                el.appendChild(bar2);
              }
              if (task.due) {
                const tag = document.createElement("div");
                tag.className = "ww-due-tag";
                tag.textContent = "Due";
                el.appendChild(tag);
              }
              grid.appendChild(el);
              blocks.push(el);
              y += task.h + 13;
            });
          });

          // Stage the bubble's opening state once, before the paused timeline
          // registers (seek-safe; CSS transforms would conflict with GSAP).
          gsap.set("#ww-bubble", { scale: 0 });

          const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

          // The window floats in as one piece; its panels then assemble
          // causally with clip-path wipes (never slide-ins past a clip edge).
          tl.fromTo(
            "#ww-window",
            { opacity: 0, y: 46, scale: 0.965 },
            { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out" },
            0.25,
          );
          tl.fromTo("#ww-header", { clipPath: "inset(0 0 100% 0)" }, { clipPath: "inset(0 0 0% 0)", duration: 0.4, ease: "power3.out" }, 0.55);
          tl.fromTo("#ww-rail", { clipPath: "inset(0 100% 0 0)" }, { clipPath: "inset(0 0% 0 0)", duration: 0.44, ease: "power3.out" }, 0.66);

          // The carried payload: the exact sentence typed in the composer
          // lands as the user's message — cause, restated.
          tl.to("#ww-bubble", { scale: 1, duration: 0.45, ease: "back.out(1.6)" }, 0.95);
          tl.fromTo("#ww-thought", { opacity: 0 }, { opacity: 1, duration: 0.3, ease: "power1.out" }, 1.55);
          tl.fromTo(
            "#ww-assist",
            { opacity: 0, y: 14 },
            { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
            2.05,
          );

          // The planner assembles: title, day headers, then task blocks.
          tl.fromTo(
            "#ww-plan-title",
            { opacity: 0, y: 12 },
            { opacity: 1, y: 0, duration: 0.35, ease: "power3.out" },
            0.85,
          );
          tl.fromTo(
            "#ww-status-a",
            { opacity: 0 },
            { opacity: 1, duration: 0.3, ease: "power1.out" },
            1.0,
          );
          heads.forEach((head, index) => {
            tl.to(head, { clipPath: "inset(0 0% 0 0)", duration: 0.34, ease: "power3.out" }, 1.25 + index * 0.06);
          });
          blocks.forEach((block, index) => {
            tl.to(block, { scale: 1, duration: 0.38, ease: "back.out(1.5)" }, 2.6 + index * 0.05);
          });

          // The peak: double shockwave from the planner's heart plus a solved
          // 1.08 camera push (focal point: planner center -> 1080, 560).
          // set + to (not fromTo): a parked visible from-state would show the
          // rings at the planner's center before the peak under arbitrary seeks.
          tl.set("#ww-shock-1", { opacity: 0.9, scale: 0.2 }, 3.94);
          tl.to("#ww-shock-1", { opacity: 0, scale: 6.5, duration: 0.8, ease: "power2.out" }, 3.95);
          tl.set("#ww-shock-2", { opacity: 0.6, scale: 0.2 }, 4.09);
          tl.to("#ww-shock-2", { opacity: 0, scale: 9, duration: 0.95, ease: "power2.out" }, 4.1);
          tl.to("#ww-world", { x: -96, y: -15, scale: 1.08, duration: 0.9, ease: "power2.inOut" }, 4.0)
            .to("#ww-world", { scale: 1.06, duration: 0.5, ease: "sine.out" }, 4.95);

          // Consequence at rest: the status pill advances Planning… -> Week
          // planned as one atomic match cut (two readable states must never
          // crossfade), then the incoming pill settles with a local pop.
          tl.set("#ww-status-a", { opacity: 0 }, 5.5);
          tl.set("#ww-status-b", { opacity: 1 }, 5.5);
          tl.fromTo("#ww-status-b", { scale: 0.85 }, { scale: 1, duration: 0.3, ease: "back.out(2)" }, 5.5);
          blocks.forEach((block) => {
            if (block.classList.contains("due")) {
              tl.to(block, { scale: 1.06, duration: 0.16, ease: "power2.in" }, 5.62);
              tl.to(block, { scale: 1, duration: 0.3, ease: "back.out(2)" }, 5.78);
            }
          });

          // Hold the settled frame; the host cuts to the dusk lockup at 7.4.
          tl.set({}, {}, 7.4);

          window.__timelines = window.__timelines || {};
          window.__timelines["chatgpt-work-world"] = tl;
        })();
      </script>
