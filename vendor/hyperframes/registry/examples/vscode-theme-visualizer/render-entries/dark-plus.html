<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Dark+ Render Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
      }

      #render-dark-plus {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000000;
      }
    </style>
  </head>
  <body>
    <div
      id="render-dark-plus"
      data-composition-id="render-dark-plus"
      data-start="0"
      data-duration="11"
      data-width="1920"
      data-height="1080"
    >
      <div
        id="clip-dark-plus"
        data-composition-id="vscode-dark-plus"
        data-composition-src="../compositions/dark-plus.html"
        data-start="0"
        data-duration="11"
        data-track-index="1"
      ></div>
      <script>
        window.__timelines = window.__timelines || {};
        window.__timelines["render-dark-plus"] = gsap.timeline({ paused: true });
      </script>
    </div>
  </body>
</html>
