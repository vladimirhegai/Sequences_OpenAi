<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  body {
    margin: 0;
    background: #0d1117;
    width: 1920px;
    height: 1080px;
    font-family: system-ui, -apple-system, sans-serif;
    color: #e6edf3;
    overflow: hidden;
  }

  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .title {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .track {
    width: 960px;
    height: 40px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }

  .bar {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #58a6ff, #3fb950);
    border-radius: 20px;
  }

  .counter {
    font-size: 160px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #58a6ff, #bc8cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .pulse-ring {
    width: 280px;
    height: 280px;
    border: 4px solid rgba(88, 166, 255, 0.3);
    border-radius: 50%;
    opacity: 0.3;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: none;
  }

  .stripe-bg {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 80px,
      rgba(88, 166, 255, 0.03) 80px,
      rgba(88, 166, 255, 0.03) 160px
    );
  }
</style>
</head>
<body>
  <div id="root"
       data-composition-id="parallel-capture-regression"
       data-width="1920"
       data-height="1080"
       data-start="0"
       data-duration="5">
    <div class="stage clip" data-start="0" data-duration="5">
      <div class="stripe-bg" id="stripes"></div>
      <div class="pulse-ring" id="pulse"></div>
      <div class="title">Parallel Capture</div>
      <div class="counter" id="counter">0</div>
      <div class="track">
        <div class="bar" id="bar"></div>
      </div>
    </div>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });
    var duration = 5;

    tl.to("#bar", { width: "100%", duration: duration, ease: "none" }, 0);

    tl.to("#pulse", {
      opacity: 0.8,
      scale: 1.15,
      duration: 0.5,
      ease: "sine.inOut",
      yoyo: true,
      repeat: Math.ceil(duration / 1) - 1,
      repeatDelay: 0,
    }, 0);

    tl.to("#stripes", {
      backgroundPosition: "226px 0",
      duration: 2,
      ease: "none",
      repeat: Math.ceil(duration / 2) - 1,
    }, 0);

    var counterObj = { val: 0 };
    tl.to(counterObj, {
      val: 150,
      duration: duration,
      ease: "none",
      onUpdate: function () {
        document.getElementById("counter").textContent = Math.floor(counterObj.val);
      },
    }, 0);

    window.__timelines["parallel-capture-regression"] = tl;
  </script>
</body>
</html>
