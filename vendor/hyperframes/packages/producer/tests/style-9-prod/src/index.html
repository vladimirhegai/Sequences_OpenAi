<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor Agent - Play Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #ffffff;
        font-family: "Nunito", sans-serif;
      }

      #main-composition {
        width: 1920px;
        height: 1080px;
        position: relative;
      }

      #bg-comp,
      #aroll-comp,
      #intro-comp,
      #stats-comp,
      #captions-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #bg-comp {
        z-index: 1;
      }

      #aroll-comp {
        z-index: 10;
      }

      #intro-comp {
        z-index: 100;
      }

      #stats-comp {
        z-index: 150;
      }

      #captions-comp {
        z-index: 200;
      }

      #aroll-container {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 0;
      }

      #short_mag_cut {
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        border: 8px solid #ffffff;
      }

      #background-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff;
        z-index: 0;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      id="main-composition"
      data-composition-id="main-video"
      data-start="0"
      data-duration="16.04"
      data-width="1920"
      data-height="1080"
    >
      <!-- Background Layer Composition -->
      <div
        id="bg-comp"
        data-composition-id="background"
        data-start="0"
        data-duration="16.04"
        data-width="1920"
        data-height="1080"
        data-track-index="1"
      >
        <div id="background-layer"></div>
        <style>
          #background-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
          }
        </style>
        <script>
          (function () {
            const tl = gsap.timeline({ paused: true });
            const bg = document.getElementById("background-layer");
            // Sync with A-roll framing 3 (4.659s)
            tl.to(bg, { backgroundColor: "#0057FF", duration: 0.5 }, 4.659);
            // Sync with A-roll framing 4 (8.88s)
            tl.to(bg, { backgroundColor: "#FFFFFF", duration: 0.5 }, 8.88);
            window.__timelines["background"] = tl;
          })();
        </script>
      </div>

      <!-- A-roll Layer Composition -->
      <div
        id="aroll-comp"
        data-composition-id="aroll-layer"
        data-start="0"
        data-duration="16.04"
        data-width="1920"
        data-height="1080"
        data-track-index="10"
      >
        <div id="aroll-container">
          <video
            id="short_mag_cut"
            src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/uploaded_assets/e5d69fa9_6c6509753f4643cd9bef0b1dc9e1e001.mp4"
            data-start="0"
            data-duration="16.04"
            data-track-index="1"
            style="width: 100%; height: auto"
          ></video>
        </div>
        <style>
          #aroll-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          #short_mag_cut {
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 8px solid #ffffff;
          }
        </style>
        <script>
          (function () {
            const tl = gsap.timeline({ paused: true });
            const container = document.getElementById("aroll-container");
            gsap.set(container, { y: -1100, scale: 0.8 });
            tl.to(container, { y: 0, duration: 1.2, ease: "elastic.out(1, 0.6)" }, 0);
            tl.to(container, { scale: 1.4, x: -300, duration: 1, ease: "back.out(1.7)" }, 1.839);
            tl.to(container, { scale: 0.7, x: 400, duration: 1, ease: "back.out(1.7)" }, 4.659);
            tl.to(container, { scale: 0.9, x: 0, duration: 1, ease: "back.out(1.7)" }, 8.88);
            window.__timelines["aroll-layer"] = tl;
          })();
        </script>
      </div>

      <!-- Compositions -->
      <div
        id="intro-comp"
        data-composition-id="intro"
        data-composition-src="compositions/intro.html"
        data-start="0"
        data-duration="16.04"
        data-width="1920"
        data-height="1080"
        data-track-index="100"
      ></div>
      <div
        id="captions-comp"
        data-composition-id="captions"
        data-composition-src="compositions/captions.html"
        data-start="0"
        data-duration="16.04"
        data-width="1920"
        data-height="1080"
        data-track-index="200"
      ></div>
      <div
        id="stats-comp"
        data-composition-id="stats"
        data-composition-src="compositions/stats.html"
        data-start="0"
        data-duration="16.04"
        data-width="1920"
        data-height="1080"
        data-track-index="150"
      ></div>

      <!-- Audio Clips -->
      <audio
        id="sfx-bounce-0"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/4ea1246d_d3e9e87e46be4104817dcd75d0adcef0.mp3"
        data-start="0"
        data-duration="1.044898"
        data-track-index="5"
      ></audio>
      <audio
        id="sfx-whoosh-1"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/52dc4e22_72f17e2dfc9f40c08f4a5cc82f53db61.mp3"
        data-start="1.839"
        data-duration="1.044898"
        data-track-index="6"
      ></audio>
      <audio
        id="sfx-pop-1"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/7ae8806d_d8eacbb4b2ab4a77af89be7208c0c918.mp3"
        data-start="2.039"
        data-duration="1.044898"
        data-track-index="7"
      ></audio>
      <audio
        id="sfx-whoosh-2"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/52dc4e22_72f17e2dfc9f40c08f4a5cc82f53db61.mp3"
        data-start="4.659"
        data-duration="1.044898"
        data-track-index="6"
      ></audio>
      <audio
        id="sfx-pop-2"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/7ae8806d_d8eacbb4b2ab4a77af89be7208c0c918.mp3"
        data-start="4.859"
        data-duration="1.044898"
        data-track-index="7"
      ></audio>
      <audio
        id="sfx-whoosh-3"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/52dc4e22_72f17e2dfc9f40c08f4a5cc82f53db61.mp3"
        data-start="8.88"
        data-duration="1.044898"
        data-track-index="6"
      ></audio>
      <audio
        id="sfx-pop-3"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/generated_assets/7ae8806d_d8eacbb4b2ab4a77af89be7208c0c918.mp3"
        data-start="9.08"
        data-duration="1.044898"
        data-track-index="7"
      ></audio>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["main-video"] = tl;
      </script>
    </div>
  </body>
</html>
