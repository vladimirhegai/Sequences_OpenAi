        /*
        * BASEL FORM (ARMIN HOFMANN)
        * Strict monochromatic, biomorphic, typographic composition
        */
        :root {
            --hf-black: #0A0A0A;
            --hf-white: #F5F5F0;
            --hf-gray: #6B6B6B;
            --frame-width: 1080px;
            --frame-height: 1920px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: var(--frame-width);
            height: var(--frame-height);
            background-color: var(--hf-white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: var(--hf-black);
        }

        #container {
            width: var(--frame-width);
            height: var(--frame-height);
            position: relative;
        }

        /* TRACK 1: REVEALS (Behind A-roll) */
        #track-1-reveals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* TRACK 0: A-ROLL */
        #track-0-aroll {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        #aroll-video {
            width: 75%;
            height: auto;
            filter: saturate(0) contrast(1.3);
        }

        /* TRACK 2: OVERLAYS (Foreground) */
        #track-2-overlays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            pointer-events: none;
        }

        /* TRACK 3: CAPTIONS */
        #track-3-captions {
            position: absolute;
            top: 1365px; /* 555px from bottom */
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 40;
            /* Caption placement y-conflict checked: well below face zone (263-736) */
        }
        
        .caption-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .caption-bg {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: var(--hf-black);
            opacity: 0;
        }
        
        .caption-text {
            position: relative;
            font-size: 48px;
            font-weight: 700;
            color: var(--hf-white);
            letter-spacing: 0.02em;
            text-transform: lowercase;
            padding: 10px 20px;
            margin: 0;
            white-space: nowrap;
            opacity: 0;
            text-align: center;
        }

        /* INTRO & OUTRO */
        .full-frame-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50; /* Above everything */
            background-color: var(--hf-white);
        }
        
        .outro-card {
            background-color: var(--hf-black);
        }

    </style>
