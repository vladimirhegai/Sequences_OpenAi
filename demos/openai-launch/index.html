<!DOCTYPE html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Codex · OpenAI launch-grammar reference film</title>
    <script src="./assets/vendor/gsap.min.js"></script>
    <style>
      @font-face {
        font-family: "Montserrat";
        font-style: normal;
        font-weight: 500;
        font-display: block;
        src: url("assets/fonts/montserrat-latin-500-normal.woff2") format("woff2");
      }

      @font-face {
        font-family: "Montserrat";
        font-style: normal;
        font-weight: 600;
        font-display: block;
        src: url("assets/fonts/montserrat-latin-600-normal.woff2") format("woff2");
      }

      @font-face {
        font-family: "Montserrat";
        font-style: normal;
        font-weight: 700;
        font-display: block;
        src: url("assets/fonts/montserrat-latin-700-normal.woff2") format("woff2");
      }

      @font-face {
        font-family: "Montserrat";
        font-style: normal;
        font-weight: 800;
        font-display: block;
        src: url("assets/fonts/montserrat-latin-800-normal.woff2") format("woff2");
      }

      @font-face {
        font-family: "IBM Plex Mono";
        font-style: normal;
        font-weight: 500;
        font-display: block;
        src: url("assets/fonts/ibm-plex-mono-latin-500-normal.woff2") format("woff2");
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #ffffff;
        font-family: "Montserrat", sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #ffffff;
      }

      /* ---------- Scene 1 · editor hook ---------- */

      #scene-editor {
        position: absolute;
        inset: 0;
        z-index: 10;
        background: #0b0d12;
      }

      #editor-window {
        position: absolute;
        left: 510px;
        top: 384px;
        width: 900px;
        height: 312px;
        border-radius: 14px;
        background: #11131a;
        border: 1px solid rgba(255, 255, 255, 0.07);
        box-shadow: 0 40px 90px rgba(0, 0, 0, 0.55);
      }

      #editor-chrome {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 46px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .editor-dot {
        position: absolute;
        top: 17px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #2a2e3c;
      }

      #editor-line {
        position: absolute;
        left: 48px;
        top: 138px;
        height: 40px;
      }

      #editor-typed {
        position: absolute;
        left: 0;
        top: 0;
        white-space: nowrap;
        font-family: "IBM Plex Mono", monospace;
        font-weight: 500;
        font-size: 30px;
        line-height: 40px;
        color: #8adf9c;
        clip-path: inset(0 100% 0 0);
      }

      #editor-caret {
        position: absolute;
        left: 0;
        top: 4px;
        width: 15px;
        height: 32px;
        background: #c7d0e8;
      }

      /* ---------- Scene 2 · kinetic typography ---------- */

      #scene-type {
        position: absolute;
        inset: 0;
        z-index: 20;
        background: #ffffff;
      }

      .kinetic-word {
        position: absolute;
        left: 0;
        width: 1920px;
        top: 0;
        height: 1080px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #101216;
        letter-spacing: -0.02em;
        opacity: 0;
      }

      #word-software {
        font-size: 210px;
      }

      #word-without {
        font-size: 140px;
      }

      #word-code {
        font-size: 230px;
      }

      /* ---------- Scene 3 · voice composer ---------- */

      #scene-composer {
        position: absolute;
        inset: 0;
        z-index: 30;
        background: #ffffff;
      }

      #composer-heading {
        position: absolute;
        left: 0;
        top: 384px;
        width: 1920px;
        text-align: center;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #101216;
        opacity: 0;
      }

      #composer-pill {
        position: absolute;
        left: 480px;
        top: 494px;
        width: 960px;
        height: 92px;
        border-radius: 46px;
        background: #ffffff;
        border: 1px solid #e3e5ec;
        box-shadow: 0 18px 60px rgba(16, 18, 22, 0.12);
        opacity: 0;
      }

      #composer-plus {
        position: absolute;
        left: 34px;
        top: 32px;
        width: 28px;
        height: 28px;
        color: #40434e;
      }

      #composer-placeholder {
        position: absolute;
        left: 88px;
        top: 30px;
        font-size: 26px;
        font-weight: 500;
        color: #595e6b;
      }

      #composer-line {
        position: absolute;
        left: 88px;
        top: 28px;
        height: 36px;
      }

      #composer-typed {
        position: absolute;
        left: 0;
        top: 0;
        white-space: nowrap;
        font-size: 26px;
        font-weight: 600;
        line-height: 36px;
        color: #16181d;
        clip-path: inset(0 100% 0 0);
      }

      #composer-caret {
        position: absolute;
        left: 0;
        top: 3px;
        width: 2px;
        height: 30px;
        background: #4b5ae4;
        opacity: 0;
      }

      #composer-wave {
        position: absolute;
        left: 796px;
        top: 34px;
        width: 44px;
        height: 24px;
      }

      .wave-bar {
        position: absolute;
        top: 0;
        width: 4px;
        height: 24px;
        border-radius: 2px;
        background: #4b5ae4;
        transform-origin: 50% 50%;
      }

      #composer-orb {
        position: absolute;
        left: 872px;
        top: 24px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #4b5ae4;
        color: #ffffff;
      }

      #orb-arrow {
        position: absolute;
        left: 12px;
        top: 12px;
        width: 20px;
        height: 20px;
      }

      #press-ripple {
        position: absolute;
        left: 1352px;
        top: 518px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid #4b5ae4;
        opacity: 0;
        transform: scale(1);
      }

      /* ---------- Scene 4 mount ---------- */

      #scene-app {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        z-index: 40;
      }

      /* ---------- Scene 5 · lockup ---------- */

      #scene-lockup {
        position: absolute;
        inset: 0;
        z-index: 50;
        background: #ffffff;
      }

      #lockup-group {
        position: absolute;
        left: 0;
        top: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 50% 46%;
      }

      #blossom {
        position: absolute;
        left: 865px;
        top: 322px;
        width: 190px;
        height: 190px;
      }

      /* The rotating knot's axis-aligned box briefly exceeds the SVG viewport
         during the bloom; the geometry itself never leaves the mark's circle,
         so let the SVG paint unclipped instead of reserving a padded viewBox. */
      #codex-mark {
        overflow: visible;
      }

      #codex-mark .cx-petal-use {
        opacity: 0;
      }

      #mark-pulse {
        position: absolute;
        left: 840px;
        top: 297px;
        width: 240px;
        height: 240px;
        border-radius: 50%;
        border: 2px solid #101216;
        opacity: 0;
      }

      #codex-name {
        position: absolute;
        left: 0;
        top: 552px;
        width: 1920px;
        text-align: center;
        font-size: 84px;
        font-weight: 800;
        letter-spacing: -0.015em;
        color: #101216;
        opacity: 0;
      }

      #codex-tagline {
        position: absolute;
        left: 0;
        top: 668px;
        width: 1920px;
        text-align: center;
        font-size: 32px;
        font-weight: 500;
        color: #595e6b;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root" data-hf-id="openai-codex-ref-root" data-composition-id="openai-codex-ref" data-start="0" data-duration="20" data-width="1920" data-height="1080" data-fps="30">
      <!-- Scene 1 · dark editor hook -->
      <div id="scene-editor" data-hf-id="scene-editor" class="clip" data-start="0" data-duration="3.7" data-track-index="1">
        <div id="editor-window" data-hf-id="editor-window">
          <div id="editor-chrome">
            <div class="editor-dot" style="left: 20px;"></div>
            <div class="editor-dot" style="left: 42px;"></div>
            <div class="editor-dot" style="left: 64px;"></div>
          </div>
          <div id="editor-line">
            <div id="editor-typed" data-hf-id="editor-typed">// what if you could build software</div>
            <div id="editor-caret" data-hf-id="editor-caret"></div>
          </div>
        </div>
      </div>

      <!-- Scene 2 · huge kinetic typography -->
      <div id="scene-type" data-hf-id="scene-type" class="clip" data-start="3.7" data-duration="3.7" data-track-index="2">
        <div id="word-software" class="kinetic-word">software</div>
        <div id="word-without" class="kinetic-word">without writing</div>
        <div id="word-code" class="kinetic-word">code?</div>
      </div>

      <!-- Scene 3 · voice composer -->
      <div id="scene-composer" data-hf-id="scene-composer" class="clip" data-start="7.4" data-duration="3.9" data-track-index="3">
        <div id="composer-heading" data-hf-id="composer-heading">What should we build?</div>
        <div id="composer-pill" data-hf-id="composer-pill">
          <svg id="composer-plus" viewBox="0 0 28 28" aria-hidden="true">
            <path d="M14 5v18M5 14h18" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" fill="none"></path>
          </svg>
          <div id="composer-placeholder">Ask anything</div>
          <div id="composer-line">
            <div id="composer-typed" data-hf-id="composer-typed">Build me a habit tracker</div>
            <div id="composer-caret"></div>
          </div>
          <div id="composer-wave" data-hf-id="composer-wave">
            <div class="wave-bar" style="left: 0;"></div>
            <div class="wave-bar" style="left: 10px;"></div>
            <div class="wave-bar" style="left: 20px;"></div>
            <div class="wave-bar" style="left: 30px;"></div>
            <div class="wave-bar" style="left: 40px;"></div>
          </div>
          <div id="composer-orb" data-hf-id="composer-orb">
            <svg id="orb-arrow" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M10 16V4M10 4l-5 5M10 4l5 5" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"></path>
            </svg>
          </div>
        </div>
        <div id="press-ripple"></div>
      </div>

      <!-- Scene 4 · product assembly over starfield (sub-composition) -->
      <div id="scene-app" data-hf-id="scene-app" class="clip" data-composition-id="codex-app-world" data-composition-src="compositions/app-world.html" data-start="11.3" data-duration="5.2" data-track-index="4" data-width="1920" data-height="1080"></div>

      <!-- Scene 5 · blossom lockup -->
      <div id="scene-lockup" data-hf-id="scene-lockup" class="clip" data-start="16.5" data-duration="3.5" data-track-index="5">
        <div id="lockup-group" data-hf-id="lockup-group">
          <div id="mark-pulse"></div>
          <div id="blossom" data-hf-id="blossom">
            <svg id="codex-mark" viewBox="0 0 200 200" width="190" height="190" aria-hidden="true">
              <defs>
                <path id="cx-loop" fill="#101216" fill-rule="evenodd" d="M77,31 a23,23 0 0 1 46,0 L123,85 a23,23 0 0 1 -46,0 Z M90,31 a10,10 0 0 1 20,0 L110,85 a10,10 0 0 1 -20,0 Z"></path>
              </defs>
              <g id="cx-mark-spin">
                <g class="cx-petal" transform="rotate(0 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
                <g class="cx-petal" transform="rotate(60 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
                <g class="cx-petal" transform="rotate(120 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
                <g class="cx-petal" transform="rotate(180 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
                <g class="cx-petal" transform="rotate(240 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
                <g class="cx-petal" transform="rotate(300 100 100)"><use class="cx-petal-use" href="#cx-loop"></use></g>
              </g>
            </svg>
          </div>
          <div id="codex-name">Codex.</div>
          <div id="codex-tagline">Where ideas turn into code.</div>
        </div>
      </div>

    </div>

    <script>
      (() => {
        // Stage opening states once, before the paused timeline registers (seek-safe).
        gsap.set("#composer-wave .wave-bar", { scaleY: 0.3 });

        const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

        // ================= Scene 1 · editor hook (0 - 3.8) =================
        const editorText = "// what if you could build software";
        const editorSteps = editorText.length;
        const editorWidth = 18 * editorSteps; // IBM Plex Mono 30px is 18px advance
        // caret blinks alone before typing: anticipation
        tl.set("#editor-caret", { opacity: 0 }, 0.22)
          .set("#editor-caret", { opacity: 1 }, 0.46)
          .set("#editor-caret", { opacity: 0 }, 0.7)
          .set("#editor-caret", { opacity: 1 }, 0.9);
        tl.to("#editor-typed", { clipPath: "inset(0 0% 0 0)", duration: 1.55, ease: `steps(${editorSteps})` }, 1.0)
          .to("#editor-caret", { x: editorWidth, duration: 1.55, ease: `steps(${editorSteps})` }, 1.0);
        // read hold with two blinks, then a hard cut to white (clip window swap)
        tl.set("#editor-caret", { opacity: 0 }, 2.85)
          .set("#editor-caret", { opacity: 1 }, 3.15)
          .set("#editor-caret", { opacity: 0 }, 3.45);

        // ================= Scene 2 · kinetic typography (3.7 - 7.4) =================
        const wordBeats = [
          { id: "#word-software", at: 3.85, out: 4.82 },
          { id: "#word-without", at: 5.06, out: 6.0 },
          { id: "#word-code", at: 6.25, out: -1 },
        ];
        for (const w of wordBeats) {
          tl.fromTo(
            w.id,
            { opacity: 0, filter: "blur(16px)", scale: 1.06 },
            { opacity: 1, filter: "blur(0px)", scale: 1, duration: 0.42, ease: "power3.out" },
            w.at,
          );
          if (w.out > 0) {
            // one readable word at a time: finish the exit before the next entrance
            tl.to(w.id, { opacity: 0, filter: "blur(12px)", scale: 0.97, duration: 0.18, ease: "power2.in" }, w.out);
            tl.set(w.id, { opacity: 0 }, w.out + 0.2);
          }
        }
        // "code?" drifts slightly larger through its hold, then blurs out inside its clip
        tl.to("#word-code", { scale: 1.035, duration: 0.5, ease: "sine.out" }, 6.7);
        tl.to("#word-code", { opacity: 0, filter: "blur(10px)", duration: 0.16, ease: "power2.in" }, 7.2);
        tl.set("#word-code", { opacity: 0 }, 7.38);

        // ================= Scene 3 · voice composer (7.4 - 11.3) =================
        tl.fromTo(
          "#composer-heading",
          { opacity: 0, y: 22 },
          { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" },
          7.55,
        );
        tl.fromTo(
          "#composer-pill",
          { opacity: 0, y: 44, scale: 0.97 },
          { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.4)" },
          7.62,
        );
        // waveform pulse: finite, deterministic, then rests
        const waveBars = gsap.utils.toArray("#composer-wave .wave-bar");
        const wavePeaks = [0.95, 0.6, 1, 0.7, 0.85];
        waveBars.forEach((bar, index) => {
          tl.fromTo(
            bar,
            { scaleY: 0.3 },
            { scaleY: wavePeaks[index], duration: 0.18, ease: "sine.inOut", repeat: 5, yoyo: true },
            8.05 + index * 0.045,
          );
        });
        // placeholder yields to the typed request
        tl.to("#composer-placeholder", { opacity: 0, duration: 0.18, ease: "power1.in" }, 8.32);
        tl.set("#composer-caret", { opacity: 1 }, 8.36);
        const composerText = "Build me a habit tracker";
        const composerSteps = composerText.length;
        const composerWidth = 14 * composerSteps; // Montserrat 600 26px average advance, tuned against the rendered frame
        tl.to("#composer-typed", { clipPath: "inset(0 0% 0 0)", duration: 1.45, ease: `steps(${composerSteps})` }, 8.5)
          .to("#composer-caret", { x: composerWidth, duration: 1.45, ease: `steps(${composerSteps})` }, 8.5);
        tl.set("#composer-caret", { opacity: 0 }, 10.15)
          .set("#composer-caret", { opacity: 1 }, 10.4)
          .set("#composer-caret", { opacity: 0 }, 10.62);
        // operated press on the send orb + ripple consequence
        tl.to("#composer-orb", { scale: 0.82, duration: 0.1, ease: "power2.in" }, 10.62)
          .to("#composer-orb", { scale: 1, duration: 0.2, ease: "back.out(2)" }, 10.72);
        tl.fromTo(
          "#press-ripple",
          { opacity: 0.85, scale: 1 },
          { opacity: 0, scale: 3.4, duration: 0.5, ease: "power2.out" },
          10.7,
        );
        // the answered request exits as one readable unit before the cut
        tl.to("#composer-heading", { opacity: 0, filter: "blur(8px)", duration: 0.26, ease: "power2.in" }, 11.02);
        tl.to("#composer-pill", { opacity: 0, filter: "blur(8px)", scale: 0.985, duration: 0.26, ease: "power2.in" }, 11.02);
        tl.set("#composer-heading", { opacity: 0 }, 11.29);
        tl.set("#composer-pill", { opacity: 0 }, 11.29);

        // Scene 4 (11.3 - 16.5) lives in compositions/app-world.html with local times.

        // ================= Scene 5 · blossom lockup (16.5 - 20) =================
        // The mark blooms from its own center: each interwoven loop springs out
        // along its base rotation while the whole knot un-spins into place.
        const petals = gsap.utils.toArray("#codex-mark .cx-petal-use");
        petals.forEach((petal, index) => {
          const at = 16.8 + index * 0.055;
          tl.fromTo(
            petal,
            { scale: 0, svgOrigin: "100 100" },
            { scale: 1, svgOrigin: "100 100", duration: 0.6, ease: "back.out(1.5)" },
            at,
          );
          tl.fromTo(petal, { opacity: 0 }, { opacity: 1, duration: 0.18, ease: "power1.out" }, at);
        });
        tl.fromTo(
          "#cx-mark-spin",
          { rotation: -32, svgOrigin: "100 100" },
          { rotation: 0, svgOrigin: "100 100", duration: 1.05, ease: "power3.out" },
          16.8,
        );
        // a single quiet pulse marks the knot's completion
        tl.fromTo(
          "#mark-pulse",
          { opacity: 0.22, scale: 0.55 },
          { opacity: 0, scale: 1.5, duration: 0.7, ease: "power2.out" },
          17.7,
        );
        tl.fromTo(
          "#codex-name",
          { opacity: 0, y: 26 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          17.55,
        );
        tl.fromTo(
          "#codex-tagline",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" },
          17.85,
        );
        // the lockup breathes almost invisibly to the end
        tl.to("#lockup-group", { scale: 1.014, duration: 2.2, ease: "sine.inOut" }, 17.7);

        // pin the timeline's full duration
        tl.set({}, {}, 20);

        window.__timelines = window.__timelines || {};
        window.__timelines["openai-codex-ref"] = tl;
      })();
    </script>
    <script src="./assets/vendor/hyperframe.runtime.iife.js"></script>
  </body>
</html>
