      <script>
        (() => {
          // Stage opening states once, before the paused timeline registers.
          gsap.set("#composer-wave .wave-bar", { scaleY: 0.3 });

          const tl = gsap.timeline({ paused: true, defaults: { overwrite: "auto" } });

          tl.fromTo(
            "#composer-heading",
            { opacity: 0, y: 22 },
            { opacity: 1, y: 0, duration: 0.45, ease: "power3.out" },
            0.15,
          );
          tl.fromTo(
            "#composer-pill",
            { opacity: 0, y: 44, scale: 0.97 },
            { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.4)" },
            0.22,
          );
          // waveform pulse: finite, deterministic, then rests
          const waveBars = gsap.utils.toArray("#composer-wave .wave-bar");
          const wavePeaks = [0.95, 0.6, 1, 0.7, 0.85];
          waveBars.forEach((bar, index) => {
            tl.fromTo(
              bar,
              { scaleY: 0.3 },
              { scaleY: wavePeaks[index], duration: 0.18, ease: "sine.inOut", repeat: 5, yoyo: true },
              0.65 + index * 0.045,
            );
          });
          // placeholder yields to the typed request
          tl.to("#composer-placeholder", { opacity: 0, duration: 0.18, ease: "power1.in" }, 0.92);
          tl.set("#composer-caret", { opacity: 1 }, 0.96);
          const composerChars = 32; // "Plan my week around my deadlines"
          const composerAdvance = 17.3; // Montserrat 600 30px average advance, tuned against the rendered frame
          tl.to("#composer-typed", { clipPath: "inset(0 0% 0 0)", duration: 1.6, ease: `steps(${composerChars})` }, 1.1)
            .to("#composer-caret", { x: composerAdvance * composerChars, duration: 1.6, ease: `steps(${composerChars})` }, 1.1);
          tl.set("#composer-caret", { opacity: 0 }, 2.82)
            .set("#composer-caret", { opacity: 1 }, 3.06);
          // atomic match cut to the 2x close-up of the same pill: the reference
          // gets its close-up energy from cuts between zoom levels, never from
          // a live camera pushing readable UI past the frame edge
          tl.set("#composer-heading", { opacity: 0 }, 3.22);
          tl.set("#composer-pill", { opacity: 0 }, 3.22);
          tl.set("#composer-closeup", { opacity: 1 }, 3.22);
          tl.fromTo(
            "#composer-closeup",
            { scale: 1.035 },
            { scale: 1, duration: 0.4, ease: "power2.out" },
            3.22,
          );
          // caret blinks once at the close-up scale, then the operated press
          tl.set("#cu-caret", { opacity: 0 }, 3.32)
            .set("#cu-caret", { opacity: 1 }, 3.52);
          tl.to("#cu-orb", { scale: 0.86, duration: 0.1, ease: "power2.in" }, 3.58)
            .to("#cu-orb", { scale: 1, duration: 0.22, ease: "back.out(2)" }, 3.68);
          // set + to (not fromTo): a parked visible from-state would show the
          // ripple ring on the orb long before the press under arbitrary seeks
          tl.set("#press-ripple", { opacity: 0.85, scale: 1 }, 3.65);
          tl.to("#press-ripple", { opacity: 0, scale: 2.0, duration: 0.5, ease: "power2.out" }, 3.66);
          // the answered request exits as one readable unit before the cut
          tl.to("#composer-closeup", { opacity: 0, filter: "blur(8px)", scale: 0.99, duration: 0.26, ease: "power2.in" }, 4.1);
          tl.set("#composer-closeup", { opacity: 0 }, 4.38);

          // pin the sub-composition's full duration
          tl.set({}, {}, 4.4);

          window.__timelines = window.__timelines || {};
          window.__timelines["chatgpt-composer"] = tl;
        })();
